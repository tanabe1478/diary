<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Diary Writer</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main id="appShell" class="app-shell">
      <section class="toolbar">
        <div>
          <p class="eyebrow">GitHub Issues Blog</p>
          <h1>Diary Writer</h1>
        </div>
        <div class="actions">
          <button id="newDraftButton" type="button" class="secondary">
            新規記事
          </button>
          <button id="refreshIssuesButton" type="button" class="secondary">
            既存記事を取得
          </button>
          <button
            id="updateIssueButton"
            type="button"
            class="secondary"
            disabled
          >
            変更を保存
          </button>
          <button id="publishButton" type="button">Issueとして投稿</button>
          <button id="focusModeButton" type="button" class="secondary">
            集中
          </button>
          <button id="previewToggleButton" type="button" class="secondary">
            Preview
          </button>
          <button id="openSettingsButton" type="button" class="secondary">
            設定
          </button>
        </div>
      </section>

      <dialog id="settingsDialog" class="settings-dialog">
        <form method="dialog" class="settings-panel">
          <div class="settings-header">
            <h2>設定</h2>
            <button
              id="closeSettingsButton"
              type="button"
              class="text-button"
              aria-label="設定を閉じる"
            >
              閉じる
            </button>
          </div>
          <p class="settings-note">
            GitHub Issues
            への投稿と更新に使う設定です。トークンはこの端末のアプリ設定に保存されます。
          </p>
          <section class="settings">
            <label>
              Owner
              <input
                id="ownerInput"
                data-testid="owner-input"
                autocomplete="off"
              />
            </label>
            <label>
              Repo
              <input
                id="repoInput"
                data-testid="repo-input"
                autocomplete="off"
              />
            </label>
            <label class="token">
              GitHub Token
              <input
                id="tokenInput"
                data-testid="token-input"
                type="password"
                autocomplete="off"
              />
            </label>
            <label>
              Theme
              <select id="themeInput" data-testid="theme-input">
                <option value="light">Light</option>
                <option value="dark">Dark</option>
              </select>
            </label>
          </section>
          <div class="settings-footer">
            <button id="saveSettingsButton" type="button">設定を保存</button>
          </div>
        </form>
      </dialog>

      <section class="workspace-layout">
        <aside class="issue-manager">
          <div class="issue-manager-header">
            <span>Articles</span>
            <span id="issueCount" class="issue-count">0</span>
          </div>
          <div id="issueList" class="issue-list" data-testid="issue-list">
            <p class="empty-list">既存記事を取得すると一覧が表示されます。</p>
          </div>
        </aside>

        <section class="editor-pane">
          <label class="title-field">
            <span>タイトル</span>
            <input
              id="titleInput"
              data-testid="title-input"
              placeholder="今日の記事タイトル"
            />
          </label>
          <label class="body-field">
            本文
            <textarea
              id="bodyInput"
              data-testid="body-input"
              spellcheck="true"
            ></textarea>
          </label>
        </section>

        <section class="preview-pane">
          <div class="preview-header">
            <span>Preview</span>
            <button id="clearDraftButton" type="button" class="text-button">
              下書きをクリア
            </button>
          </div>
          <article id="preview" class="markdown-preview"></article>
        </section>
      </section>

      <p id="statusMessage" class="status" role="status"></p>
    </main>

    <script src="./renderer.js"></script>
  </body>
</html>
